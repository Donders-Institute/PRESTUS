name: Deploy PRESTUS
on:
  push:
    branches: [ master, development ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install mkdocs-material
    - run: mkdocs gh-deploy --force