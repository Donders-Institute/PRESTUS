# Liberal medium properties for uncertainty quantification.
#
# This parameter set is designed to produce the UPPER bound of plausible
# acoustic intensity and heating at the brain target. It represents a skull
# with low acoustic impedance and low attenuation (more energy transmitted)
# combined with brain tissue properties that maximise absorption.
#
# Use this config as the WORST-CASE variant for safety assessments.
# If safety limits are met under these assumptions, they are expected to be
# met under any plausible tissue configuration.
#
# Sources: Aubry et al. (2025) ITRUSST consensus; Marsac et al. (2017);
#          Pinton et al. (2012); Deffieux & Konofagou (2010).

medium_properties:
  brain:
    sound_speed: 1568             # m/s   — upper bound (Deffieux & Konofagou 2010)
    density: 1046                 # kg/m³ — nominal
    alpha_coeff: 0.36             # dB/(cm·MHz) — lower bound (less attenuation → more intensity)
    alpha_power: 1.0
    thermal_conductivity: 0.55    # W/(m·K) — upper bound
    specific_heat_capacity: 3696  # J/(kg·K) — upper bound
    perfusion: 809                # mL/min/kg — upper bound (more cooling)
    absorption_fraction: 1.0      # fraction of attenuation converted to heat

  skull:
    sound_speed: 2257             # m/s   — lower bound (less impedance mismatch → more transmission)
    density: 1178                 # kg/m³ — lower bound (less impedance mismatch)
    alpha_coeff: 6.9              # dB/(cm·MHz) — lower bound (less skull attenuation)
    alpha_power: 1.0
    thermal_conductivity: 0.32    # W/(m·K) — nominal
    specific_heat_capacity: 2626  # J/(kg·K) — upper bound
    perfusion: 30                 # mL/min/kg — upper bound
    absorption_fraction: 0.16     # fraction of attenuation converted to heat (BabelBrain default)

  skull_trabecular:
    sound_speed: 2257             # m/s   — lower bound (less impedance mismatch → more transmission)
    density: 1178                 # kg/m³ — lower bound (less impedance mismatch)
    alpha_coeff: 6.9              # dB/(cm·MHz) — lower bound (less skull attenuation)
    alpha_power: 1.0
    thermal_conductivity: 0.32    # W/(m·K) — nominal
    specific_heat_capacity: 2626  # J/(kg·K) — upper bound
    perfusion: 30                 # mL/min/kg — upper bound
    absorption_fraction: 0.16     # fraction of attenuation converted to heat (BabelBrain default)

  skull_cortical:
    sound_speed: 2257             # m/s   — lower bound (less impedance mismatch → more transmission)
    density: 1178                 # kg/m³ — lower bound (less impedance mismatch)
    alpha_coeff: 6.9              # dB/(cm·MHz) — lower bound (less skull attenuation)
    alpha_power: 1.0
    thermal_conductivity: 0.32    # W/(m·K) — nominal
    specific_heat_capacity: 2626  # J/(kg·K) — upper bound
    perfusion: 30                 # mL/min/kg — upper bound
    absorption_fraction: 0.16     # fraction of attenuation converted to heat (BabelBrain default)
