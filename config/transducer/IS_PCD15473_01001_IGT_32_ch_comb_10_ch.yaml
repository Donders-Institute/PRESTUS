# PRESTUS transducer library — calibration results only
# Equipment combination: IS_PCD15473_01001 + IGT_32_ch_comb_10_ch
#
# Geometry is not stored here; load_transducer_from_library reads it from
# config_equipment.yaml via the combo's tran_serial.
#
# calibration.focal_depths is populated by calibration runs. Keys are focal
# distances encoded as f{mm}p{decimal} (e.g. 85.0 mm -> f85p0). Each entry
# stores the fitted parametric phase model and an amplitude lookup table keyed
# by intensity (i{W_cm2}p{decimal}).

meta:
  combo_name: IS_PCD15473_01001_IGT_32_ch_comb_10_ch
  tran_serial: IS_PCD15473_01001
  ds_serial: IGT_32_ch_comb_10_ch
  calibration_date: ''
  calibration_operator: ''
  calibration_site: ''
  prestus_version: ''
  characterization_source:
    axial_profile: Axial_profiles_IS_PCD15473_01001~IGT_32_ch_comb_10_ch.csv
    phase_table: transducer_15473_10_300kHz.ini

calibration:
  focal_depths: {}
