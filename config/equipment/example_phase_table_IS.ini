; Example Imasonic element-position INI file
;
; FORMAT expected by set_real_phases (manufact = 'Imasonic'):
;   read_ini_file() parses this into a struct; compute_phases() reads it.
;
;   Section [elements] is required.  Each key x1 … xN defines the 3-D position
;   of one element's representative point (ring mid-radius), given as:
;
;       xi = X_mm|Y_mm|Z_mm
;
;   Coordinate system:
;     - Origin : natural focus of the transducer (centre of curvature).
;     - Z-axis : axial direction, pointing away from the bowl toward the target.
;     - X/Y    : lateral directions (Y = 0 for annular arrays by convention).
;     - Z is negative for all elements (they are behind the focal plane).
;
;   For a spherical bowl with radius of curvature R [mm], an element whose
;   ring midpoint is at radial distance r_mid [mm] from the axis sits at:
;
;       x = r_mid,  y = 0,  z = -sqrt(R^2 - r_mid^2)
;
;   where r_mid = (inner_diameter/2 + outer_diameter/2) / 2
;              = (elem_id_mm + elem_od_mm) / 4
;
;   These positions can be generated automatically for 'generic' manufacturer
;   transducers by generate_tran_ini_from_geometry(); the INI file is only
;   required when manufact = 'Imasonic'.
;
; For the example 4-element transducer EXAMPLE_500_001:
;   R = 70 mm,  elem_id = [0, 20.5, 28.5, 35.0],  elem_od = [20, 28, 34.5, 40]
;   r_mid = [5.0, 12.125, 15.75, 18.75] mm
;   z     = [-69.82, -68.94, -68.20, -67.44] mm
;
[elements]
x1=5.0|0.0|-69.82
x2=12.125|0.0|-68.94
x3=15.75|0.0|-68.20
x4=18.75|0.0|-67.44
