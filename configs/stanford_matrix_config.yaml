# If you encounter the error "The qform and sform of do not match. Please run charm with the --forceqform option" when running charm, you can set this to 1 to do it for all subjects
use_forceqform: 0

# Use the kwaveArray class for simulations
use_kWaveArray: 1

# New transducer development implementation
unique_tran_design: 5 # 1: Annular array, 2: old lookalike dolphin design, 3: flat circular matrix transducer, 4: curved circular matrix transducer
display_tran: 1

transducer: 
  n_elements: 64 # number of elements in the transducer
  n_elem_row: 8 # number of rows in the transducer
  n_elem_col: 8 # number of columns in the transducer
  elem_height: 6e-3 # [m] 
  elem_width: 6e-3 # [m]
  elem_spacing_height: 0.5e-3 # [m]
  elem_spacing_width: 0.5e-3 # [m]
  curv_radius_mm: 75 # radius of curvature of the bowl 
  dist_to_plane_mm: 67.6 # 7.4 calculated distance to the transducer plane from the geometric focus
  source_amp: 1000000 # [Pa]
  source_phase_deg: [0] # original: [0.0, 13.2, 26.4, 52.8] # source phase [deg] (calibrated values at 20 W/cm^2 free-water Isppa)
  source_freq_hz: 500e3 # [Hz] the central frequency
  pos_t1_grid: [128, 139, 15] # position on T1 grid 
  
  # For visualization purposes, use calc_virtual_elem to define them
  Elements_ID_mm: [0.000, 1.016, 2.031, 3.047, 4.062, 5.078, 6.094, 7.109, 8.125, 9.141, 10.156, 11.172, 12.188, 13.203, 14.219, 15.234, 16.250, 17.266, 18.281, 19.297, 20.312, 21.328, 22.344, 23.359, 24.375, 25.391, 26.406, 27.422, 28.438, 29.453, 30.469, 31.484, 32.500, 33.516, 34.531, 35.547, 36.562, 37.578, 38.594, 39.609, 40.625, 41.641, 42.656, 43.672, 44.688, 45.703, 46.719, 47.734, 48.750, 49.766, 50.781, 51.797, 52.812, 53.828, 54.844, 55.859, 56.875, 57.891, 58.906, 59.922, 60.938, 61.953, 62.969, 63.984]
  Elements_OD_mm: [1.016, 2.031, 3.047, 4.062, 5.078, 6.094, 7.109, 8.125, 9.141, 10.156, 11.172, 12.188, 13.203, 14.219, 15.234, 16.250, 17.266, 18.281, 19.297, 20.312, 21.328, 22.344, 23.359, 24.375, 25.391, 26.406, 27.422, 28.438, 29.453, 30.469, 31.484, 32.500, 33.516, 34.531, 35.547, 36.562, 37.578, 38.594, 39.609, 40.625, 41.641, 42.656, 43.672, 44.688, 45.703, 46.719, 47.734, 48.750, 49.766, 50.781, 51.797, 52.812, 53.828, 54.844, 55.859, 56.875, 57.891, 58.906, 59.922, 60.938, 61.953, 62.969, 63.984, 65.000]

focus_pos_t1_grid: [128, 142, 85] # stimulation target on T1 grid

default_grid_dims: [300, 300, 300]

thermal:
  duty_cycle: 0.5 # share of the stimulation duration during which the stimulation is on
  sim_time_steps: 0.1 # [s] simulation time steps during the stimulation period
  temp_0: 37 #[deg C] initial temperature, currently not used
  stim_duration: 0.6 # [s] stimulation duration within a trial
  iti: 1.2 # interval between the trials, from the start of one trial to the start of another [s]
  n_trials: 12 # number of trials to simulate; the total simulated duration is then n_trials*iti seconds



# Segmentation software (current options are 'headreco' and 'charm')
segmentation_software: charm