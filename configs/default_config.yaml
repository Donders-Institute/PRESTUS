# The configuration is structured using YAML (https://yaml.org/). Note that YAML uses spaces, not tabs, for identation.

# !!! Important !!! Do not edit this document. Instead, copy (at least) the first segment into your own config file.

#------------------------------------------------
#------------ Setup-specific specfication (Defaults)
# The following information is study-specific.
# Defaults should be overwritten (where sensible or necessary) in a separate <simulation-X>config.yaml file.
#------------------------------------------------

#------------ General

subject_id: 0    # Participant ID (integer, used for path substitution in path.t1_pattern and path.t2_pattern) 
platform: 'auto' # Execution platform: auto (recommended) | slurm | qsub | matlab (recommended for debugging)

#------------ Simulation type & execution

simulation:
  medium: layered     # select which medium setup to use: 'water' or 'layered' (a layered medium consists of several layers defined below)
  code_type: matlab_gpu # Select which k-Wave code to run:
                        #   MATLAB CPU code 'matlab_cpu'
                        #   MATLAB GPU code 'matlab_gpu'
                        #   C++ CPU code 'cpp_cpu'
                        #   C++ GPU code 'cpp_gpu'
  precision: 'single' # Computational precision for both acoustic and thermal simulations
  interactive: 0      # Run in interactive mode (ask for user input when necessary, plot evolving figures)
  debug: 1            # Activate debug mode with additional intermediate outputs?

#------------ Paths

path:
  anat: ''              # Location of the structural input data [full path]
  sim: ''               # Location of the simulation outputs [full path or folder name in path.anat]
  seg: ''               # Location of the segmentation directories (containing m2m folders) [full path]
  t1_pattern: 'sub-%1$03d_T1w.nii*' # T1 image path template relative to path.anat; supports %03d-style subject ID substitution
  t2_pattern: 'sub-%1$03d_T2w.nii*' # T2 image path template relative to path.anat
  localite: ''          # Path to Localite neuronavigation output folder
  subject_subfolder: 1  # Should each participant's output be stored in a separate folder?

#------------ Startup (environment & toolbox paths)

startup:
  simnibs_bin_path: ''  # Path to the SimNIBS environment (please use full paths)
  paths_to_add: []      # Additional paths to add with addpath()
  subpaths_to_add: []   # Paths to add recursively with addpath(genpath()); relative to config file location

#------------ I/O management

io:
  output_affix: ''          # Optional affix for output file names; differentiates outputs for the same subject/transducer
  overwrite_files: always   # 'never' to never overwrite, 'always' to always overwrite, any other value to ask for confirmation
  overwrite_simnibs: 0      # By default, SimNIBS segmentation results are not overwritten, unless enabled here
  save_matrices: 0          # Save output matrices?
  save_heatingvideo: 0      # Save a video of incremental heating?

#------------ Module execution

modules:
  run_grid_setup: 1         # Setup grid and run head processing? Mandatory for simulations.
  run_medium_setup: 1       # Map medium acoustic properties? Mandatory for simulations.
  run_source_setup: 1       # Set up acoustic source? Mandatory for simulations.
  run_acoustic_sims: 1      # Run acoustic simulations?
  run_acoustic_analysis: 1  # Run acoustic analysis?
  run_heating_sims: 0       # Run thermal simulations? Default: off; run once acoustic simulation provides sensible results.
  run_thermal_analysis: 1   # Run thermal analysis?
  run_nifti_creation: 1     # Run nifti creation?
  run_posthoc_water_sims: 1 # Run simulations in free water with identical setup?
  generate_report: 1        # Generate a self-contained HTML simulation report at the end of the pipeline?
  segmentation_only: 0      # Stop after segmentation (skip grid setup and all simulations)? 1=yes, 0=no

#------------ High-performance computing
hpc:
  name: 'default'   # 'default' or 'snellius'
  gpu: ''
  partition: ''
  reservation: ''
  wait_for_job: false
  timelimit: '04:00:00'
  memorylimit: 20
  ld_library_path: '' # [qsub] /opt/gcc/7.2.0/lib64 | [slurm]: /home/'group'/'user'/.conda/envs/simnibs_env/lib/python3.9/site-packages/simnibs/mesh_tools/cgal/../../external/lib/linux
  job_prefix: 'PRESTUS' # Prefix for HPC job names
  max_wait_checks: 540  # Maximum number of status checks when waiting for a job (1 check/20s ≈ 3 hours)

# Smallest possible allocation (https://servicedesk.surf.nl/wiki/spaces/WIKI/pages/30660209/Snellius+partitions+and+accounting)
snellius:
  gpu_a100:
    cores: 18
    memorylimit: 120
    timelimit: "120:00:00" # max wall time of 120 h
    n_gpu: 1
  gpu_h100:
    cores: 16
    memorylimit: 180
    timelimit: "120:00:00" # max wall time of 120 h
    n_gpu: 1

#------------ Target analysis
analysis:
  focus_area_radius: 5  # Radius of the target area around the focus in which the ISPPA is averaged for the outputs [mm]

#------------ Transducer specification  (no defaults)

transducer:
  # ------------------------------
  # General annular/matrix properties
  # ------------------------------
  array_shape:
    type: []                # 'annular' for Annular array or 'matrix' for Matrix array

    # --------------------------
    # Annular transducer parameters
    # --------------------------
    annular:
      n_elements: []        # Number of elements in the transducer [#]
      Elements_ID_mm: []    # Inner diameter of each element [mm]
      Elements_OD_mm: []    # Outer diameter of each element [mm]
      curv_radius_mm: []    # Radius of curvature of the bowl [mm]
      dist_to_plane_mm: []  # Distance from transducer plane to geometric focus [mm]
      source_phase_deg: []  # Source phase of each element [deg] (0-360)

    # --------------------------
    # Matrix transducer parameters
    # --------------------------
    matrix:
      steering: []          # '1D' (Axial steering) or '3D' (Volumetric steering)
      element_shape: []     # 'rect', 'disc', or 'bowl' - physical shape of each element
      elem_height_mm: []    # Element height [mm]
      elem_width_mm: []     # Element width [mm]
      outer_diameter_mm: [] # Outer diameter of the transducer [mm]
      is_curved: []         # true if transducer has a curved (spherical) surface, false if flat
      curved:
        curv_radius_mm: []   # Radius of curvature of the bowl [mm]
        dist_to_plane_mm: [] # Distance from transducer plane to geometric focus [mm]

      # Optional Clover multi-aperture configuration
      is_clover_setup: []  # true to enable Clover replication
      clover:
        n_leaves: []       # Number of leaves (1–3)
        ROC_parent: []     # Radius of curvature of parent setup [mm]

      # --------------------------
      # Grid definition
      # --------------------------
      matrix_shape:
        type: []           # 'define_here' (define grid manually) or 'extract_from_file' (load positions from file)

        # If define_here is used:
        define_here:
          grid_shape:
            type: []       # 'rect', 'fibonacci', 'fermat' - type of grid layout

            rect:
              n_elem_row: []          # Number of rows in rectangular grid
              n_elem_col: []          # Number of columns in rectangular grid
              elem_spacing_height_mm: [] # Edge-to-edge spacing between rows [mm]
              elem_spacing_width_mm: []  # Edge-to-edge spacing between columns [mm]
              sparsity_factor: []     # Fraction of elements used (0 < value <= 1)

            fibonacci:
              n_elements: []          # Total number of elements for Fibonacci grid
              kerf_mm: []             # Minimum spacing between elements [mm]

            fermat:
              n_elements: []          # Total number of elements for Fermat spiral grid

        # If extract_from_file is used:
        extract_from_file:
          file_path: []              # Path to file with element positions (x, y, z) [string]
          start_row: []              # Row in file where element data starts
          start_col: []              # Column in file where element data starts
          n_elements: []             # Total number of elements to extract
          select_random_subset: []   # true to randomly pick a subset
          subset:
            random_seed: []          # true to use a new seed each run, false to fix seed
            subset_n_elements: []    # Number of elements in the subset
          project_on_new_ROC: []     # true to project elements onto new ROC
          ROC_projection:
            new_ROC_mm: []           # New desired radius of curvature [mm]
  
  depth_mm: []          # Depth of transducer used for visualization purposes [mm]
  source_amp: []        # Pressure amplitude [Pa] 
  source_freq_hz: []    # Fundamental frequency [Hz]
  trans_pos: []         # Transducer position [T1 grid space]
  focus_pos: []         # Stimulation target position[T1 grid space]

#------------ Transducer Placement

placement:
  localite:
    enabled: 0        # Should the script position_transducer_localite be used?
    reference_distance_mm: 15 # Allows one to correct for varying distances between the infrared trackers attached to the transducer and the exit plane (can only be used with the function 'transducer_from_localite')
  heuristic:
    dist_close: []
    ear_radius: 35
    save_localite_t1: false # Save Localite-aligned T1 output for header correction?
    left_ear_center: []
    right_ear_center: []
    criterion_intersection: 0.05
    criterion_skin_mean: []
    criterion_skull_mean: []
    criterion_skin_var: []
    criterion_skull_var: []
    expand_step: 0.01

#------------ Simulation grid

grid:
  resolution_mm: 0.5  # Grid resolution (must be isotropic) [mm]
  default_dims: [144, 144, 400] # [points per dimension] [used for setting up free-water grid]
  pml_size: 10        # Perfectly Matched Layer (PML) size [3D recommendation: 10]
  source_ppw: []      # Points Per Wavelength [default: calculated internally]
  source_cfl: 0.15    # Courant-Friedrichs-Lewy fraction
  source_limit_fraction: 0.9 # Fraction of the stability limit to use for time step (0 = do not use stability limit)
  max_expand: 40      # Prime number grid expansion size to (potentially) speed up computations
  use_kWaveArray: 1   # Use the kwaveArray class for transducer modeling?
  axisymmetric: 0     # Use 2D axisymmetric simulation mode?

#------------ Segmentation

segmentation:
  use_qform: 0      # Force qform reorientation before charm segmentation? Set to 1 if charm reports qform/sform mismatch.
  debug: 0          # Pass --debug flag to charm segmentation for verbose output?

#------------ Head model processing

headmodel:
  head_pad_mm: 0      # Symmetric padding applied to the cropped head grid prior to transducer + PML setup [mm]
  csf_expansion: 40   # Dilation of the CSF brain mask into surrounding head regions [grid voxels]
  # Thresholds for smoothing masks (and acoustic properties)
  smooth_method: 'gaussian' # Filter type ['gaussian' (default)|'box']
  smooth_threshold_skull: 0.5 # (higher threshold -> thinner mask)
  smooth_threshold_other: 0.5 # (higher threshold -> thinner mask)
  smooth_fwhm_mm: 1   # Smoothing FWHM [mm]
  smooth_properties: false # Apply smoothing with parameters above to acoustic property maps?
  # Settings for skull hole-filling
  skull_fill_method: 'rubberwrap' # Method for filling holes in the skull ['rubberwrap'(default)/'imclose']
  skull_wrap_radius: 10 # Rubber-wrap radius [grid voxels]; larger = tighter rubber ignoring bigger dents (recommendation: 2–10)
  skull_wrap_visualize: 0 # Visualize rubber-wrap result? (Currently causes issues on HPC)

#------------ (pseudo-)CT skull property mapping

pct:
  enabled: 0                    # Use (p)CT (if available) to inform skull medium properties
  mapping_density: 'k-plan'     # pCT mapping algorithm for density: k-plan/k-wave/marsac/aubry
  mapping_soundspeed: 'k-plan'  # pCT mapping algorithm for sound speed: k-plan/marsac/aubry
  mapping_attenuation: 'k-plan' # pCT mapping algorithm for attenuation: k-plan/mueller

#------------ Simulation layers
# Assign tissue compartments to model, with their SimNIBS segmentation label indices.
# You can remove or add layers. If you want a skull-only simulation, remove brain and skin for example.

layers:
  water: [0, 3, 6, 9, 10] # this isn't really neccessary as water is a default layer - all that has a number not used for other layers will be assigned water properties
  brain: [1, 2]
  skin: [5]
  skull: [4]
  skull_cortical: [7]
  skull_trabecular: [8]

#------------ Sonication timing protocol (no defaults - must be specified for thermal simulations)

timing:
  pd: 0            # Pulse Duration (PD) [s]
  pri: 0           # Pulse Repetition Interval (PRI) [s]; PRF = 1/pri
  ptd: 0           # Pulse Train Duration (PTD) [s]
  pt_timestep: 0.02   # Modelling time step within a pulse train [s]
  ptri: 0          # Pulse Train Repetition Interval (PTRI) [s]
  ptrd: 0          # Pulse Train Repetition Duration (PTRD) [s]
  post_ptri_dur: 0 # Post-PTRI steady-state duration [s]
  post_pt_timestep: 1 # Modelling time step following PT & PTRI [s]
  equal_step_duration: 0 # Equal step durations for on and off cycles? 1=yes, 0=no

#------------ Thermal parameters

thermal:
  cem43_iso: 0
  temp_0: #[deg C] initial temperature
    water: 37
    skull: 37
    brain: 37
    skin: 37
    skull_trabecular: 37
    skull_cortical: 37
  sensor_xy_halfsize: 100 # maximum size of the sensor window in which the temperature is recorded (in grid units)
  record_t_at_every_step: 0 # should we record temperature for every time step _for the whole sensor window_ (memory intensive, turn off if you experience 'out of memory' issues)

#------------  Medium properties
# References: ITRUSST benchmarks (https://arxiv.org/abs/2202.04552); Tissue Properties DB (https://itis.swiss/virtual-population/tissue-properties/overview/);
# Note: skull attenuation and absorption values remain uncertain, use defaults with caution!
medium_properties:
  water:
    sound_speed: 1500
    density: 994
    alpha_coeff: 2.17e-3
    alpha_power: 2
    thermal_conductivity: 0.60 # [W/m/°C]
    specific_heat_capacity: 4178 # [J/kg/°C]
    perfusion: 0
    absorption_fraction: 1
  brain:
    sound_speed: 1546 # [m/s]
    density: 1046 # [kg/m^3]
    alpha_coeff: 0.59
    alpha_power: 1.2
    thermal_conductivity: 0.51 # [W/m/°C]
    specific_heat_capacity: 3630 # [J/kg/°C]
    perfusion: 559
    absorption_fraction: 1
  skin:
    sound_speed: 1610 # [m/s]
    density: 1090 # [kg/m^3]
    alpha_coeff: 0.4
    alpha_power: 1
    thermal_conductivity: 0.37 # [W/m/°C]
    specific_heat_capacity: 3391 # [J/kg/°C]
    perfusion: 106
    absorption_fraction: 1
  skull: # (single skull layer only; mostly following cortical bone)
    sound_speed: 2800 # [m/s]
    density: 1850 # [kg/m^3]
    alpha_coeff: 13.3
    alpha_power: 1
    thermal_conductivity: 0.32 # [W/m/°C]
    specific_heat_capacity: 1793 # [J/kg/°C]
    perfusion: 20
    absorption_fraction: 0.28
  skull_trabecular: # trabecular bone
    sound_speed: 2300 # [m/s]
    density: 1700 # [kg/m^3]
    alpha_coeff: 13.3
    alpha_power: 1
    thermal_conductivity: 0.32 # [W/m/°C]
    specific_heat_capacity: 2274 # [J/kg/°C]
    perfusion: 30
    absorption_fraction: 0.28
  skull_cortical: # cortical bone
    sound_speed: 2800 # [m/s]
    density: 1850 # [kg/m^3]
    alpha_coeff: 13.3
    alpha_power: 1
    thermal_conductivity: 0.32 # [W/m/°C]
    specific_heat_capacity: 1313 # [J/kg/°C]
    perfusion: 10
    absorption_fraction: 0.28